schema_version: 1
facts:
- id: delivery-pr
  module: repo-wide
  kind: constraint
  channel: briefing
  text: Deliver every change as a PR to a working branch (e.g. dev/vllm-align); `main`
    is protected and must never be direct-pushed.
  source: agent
  evidence:
  - adapters/vllm_omni/manifest.yaml push.allowed=false / protected_branches=[main]
  - 'owner policy: deliver via PR, not direct commit'
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: torch-accelerator
  module: repo-wide
  kind: convention
  channel: briefing
  text: Never call `torch.cuda.*` — ruff bans it; use the `torch.accelerator.*` equivalents
    (device_count, current_device_index, empty_cache, synchronize, max_memory_allocated,
    reset_peak_memory_stats).
  source: agent
  evidence:
  - vllm-omni/pyproject.toml [tool.ruff] banned-api rules for torch.cuda.*
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: omni-fork
  module: repo-wide
  kind: note
  channel: briefing
  text: vLLM-Omni is a fork of upstream vLLM extending it to omni-modality (text/image/video/audio)
    serving; releases align to an upstream vLLM version and rebasing onto upstream
    is the core maintenance activity.
  source: agent
  evidence:
  - vllm-omni/README.md 'About' + release notes (0.16 rebased onto vLLM 0.16, 0.22
    aligned to vLLM 0.22)
  - adapters/vllm_omni/manifest.yaml upstream.kind=fork_tracking
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: multi-platform
  module: repo-wide
  kind: constraint
  channel: briefing
  text: 'Don''t assume CUDA: the repo targets CUDA/ROCm/NPU/XPU. Platform code is
    per-backend and dependencies are platform-specific (requirements/), not installed
    via a [cuda] extra.'
  source: agent
  evidence:
  - vllm-omni/pyproject.toml (dynamic platform deps, no [cuda] extra)
  - vllm-omni/docker/Dockerfile.{cuda,rocm,npu,xpu}
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: rebase-hotspots
  module: repo-wide
  kind: trap
  channel: briefing
  text: Highest rebase-damage risk is worker_runner, model_executor and scheduler
    (vllm_omni/core/) — they track upstream vLLM internals closely; after a rebase
    check for dropped/duplicated hunks and references to moved/renamed symbols.
  source: agent
  evidence:
  - 'adapters/vllm_omni/manifest.yaml modules with risk: high'
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: audio-similarity-trap
  module: audio
  kind: trap
  channel: briefing
  text: Audio/TTS similarity below the 0.9 gate is often a whisper-small ASR mishearing
    a short/quiet clip, not a model regression — re-check with whisper-large-v3 before
    flagging (large-v3 scored 200/200 where small failed).
  source: agent
  evidence:
  - 'verified rebase observation 2026-06 (Higgs-Audio-V3 ''Shhh!'' clip: whisper-large-v3
    200/200 clean)'
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: dockerfile-ci-pins
  module: platform
  kind: trap
  channel: briefing
  text: 'docker/Dockerfile.ci env pins are fragile across rebases — recurring breakers:
    numpy must stay <2.5 (numba incompatibility), a missing libnvJitLink.so.13, and
    transformers AutoProcessor.register API drift.'
  source: agent
  evidence:
  - rebase CI build 2520 align-branch failures, 2026-07
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: ci-skip-not-fail
  module: repo-wide
  kind: note
  channel: briefing
  text: CI is Buildkite (org vllm). A PR's tests can be legitimately skipped by the
    skip-ci resolver (docs-only or pytest skip-mark diffs) — a skipped run is NOT
    a failing run; image-build still runs for the nightly exception.
  source: agent
  evidence:
  - vllm-omni/.buildkite/pipeline.yml (upload_pipeline.py skip-ci resolution)
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: collected-zero-is-path
  module: repo-wide
  kind: trap
  channel: briefing
  text: pytest 'collected 0 items' (rc=4) means a stale/renamed test path, not OOM
    — after a test-file rename, verify the CI test command still points at real files.
  source: agent
  evidence:
  - 'rebase run: config.sh CI_TEST_CMD referenced pre-rename *_expansion.py/*_tts.py
    paths'
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: build-and-lint
  module: repo-wide
  kind: command
  channel: machine
  text: Python 3.10–3.13; build via setuptools (dynamic version + platform deps);
    lint/format via ruff + pre-commit.
  source: agent
  evidence:
  - vllm-omni/pyproject.toml requires-python='>=3.10,<3.14', build-backend=setuptools
  - adapters/vllm_omni/manifest.yaml validation.precommit=true
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: ci-entry
  module: repo-wide
  kind: command
  channel: machine
  text: 'CI image: `docker build --file docker/Dockerfile.ci -t vllm-omni-ci .`; pipeline
    entry `.buildkite/scripts/upload_pipeline.py` uploads the test-ready / test-merge
    / test-nightly / test-weekly child pipelines.'
  source: agent
  evidence:
  - vllm-omni/.buildkite/pipeline.yml
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: scheduler-is-core
  module: scheduler
  kind: note
  channel: retrieved
  text: The 'scheduler' module maps to vllm_omni/core/ (per the manifest module map)
    — not a top-level scheduler/ directory.
  source: agent
  evidence:
  - adapters/vllm_omni/manifest.yaml modules.scheduler.local_paths=[vllm_omni/core/]
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: diffusion-nonar
  module: diffusion
  kind: note
  channel: retrieved
  text: vLLM-Omni adds a non-autoregressive path (Diffusion Transformers / DiT) alongside
    vLLM's autoregressive path; image/video generation and parts of the audio stack
    run through vllm_omni/diffusion/.
  source: agent
  evidence:
  - vllm-omni/README.md (non-autoregressive DiT architectures)
  - vllm-omni/vllm_omni/diffusion/
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: image-ssim-sensitive
  module: image
  kind: trap
  channel: retrieved
  text: Image-generation tests compare outputs with SSIM thresholds sensitive to nondeterminism
    — HunyuanImage SSIM has flaked; confirm a real regression (reproduce, compare
    against baseline) before flagging a threshold miss.
  source: agent
  evidence:
  - rebase CI build 2520 align-branch failures, 2026-07
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: transformers-drift
  module: model_executor
  kind: trap
  channel: retrieved
  text: transformers version drift breaks model loading across rebases (e.g. AutoProcessor.register
    signature changes) — pin and verify transformers when a rebase bumps it.
  source: agent
  evidence:
  - rebase CI build 2520 (transformers AutoProcessor.register regression), 2026-07
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: ci-signature-normalize
  module: repo-wide
  kind: trap
  channel: retrieved
  text: When grouping CI failures, normalize signatures — the same underlying failure
    recurs across runs with slightly different text; exact-string comparison misclassifies
    a known/flaky failure as new.
  source: agent
  evidence:
  - 'rebase-agent debug lesson: CI baseline exact-string signature bug in monitor.py'
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: benchmarks-wave2
  module: benchmarks
  kind: note
  channel: retrieved
  text: benchmarks/ is rebase wave 2 (lower priority than the wave-1 runtime modules);
    its scripts validate throughput/latency, not output correctness.
  source: agent
  evidence:
  - adapters/vllm_omni/manifest.yaml modules.benchmarks.wave=2
  first_seen: '2026-07-11'
  last_confirmed: '2026-07-11'
  confirmations: 1
  status: active
- id: repo-wide-convention-design-suggestions
  module: repo-wide
  kind: convention
  channel: briefing
  text: Surface the best design suggestion found during review even on approvable
    PRs (single-source-of-truth asks) — never silently drop it; empty review of a
    nontrivial diff = missed value.
  source: agent
  evidence:
  - 'github:vllm-omni#4825 inline (dsocek: derive LoRA components from _packed_modules_mapping)'
  - 'eval train GT 2026-07: #4810->issue#4891, #4870->#4910 follow-ups'
  first_seen: '2026-07-12'
  last_confirmed: '2026-07-12'
  confirmations: 1
  status: active
  history:
  - Maintainers add design suggestions even to approvable PRs — surface the best single-source-of-truth
    suggestion found during review instead of dropping it; empty review of a nontrivial
    clean diff = missed value.
- id: worker-trap-removed-api-sweep
  module: worker_runner
  kind: trap
  channel: briefing
  text: A PR adapting callers of a removed/renamed upstream API needs a repo-wide
    grep proving no caller remains (diffusion/, vendored, gpu_/npu_ included).
  source: agent
  evidence:
  - github:vllm-omni#4810 'missed by' -> issue#4891 (HunyuanImage3 diffusion loader)
  first_seen: '2026-07-12'
  last_confirmed: '2026-07-12'
  confirmations: 1
  status: active
  history:
  - A PR adapting callers of a removed/renamed upstream API is incomplete until a
    repo-wide grep proves no caller remains (diffusion/, vendored, gpu_/npu_ counterparts
    included).
- id: model_executor-trap-omni-phase-metadata
  module: model_executor
  kind: trap
  channel: briefing
  text: Worker runner _preprocess emits per-request _omni_prompt_len/_omni_num_computed_tokens/_omni_is_prefill
    consumed by model talkers — review producer and consumers together.
  source: agent
  evidence:
  - vllm_omni/worker/gpu_model_runner.py (producer)
  - vllm_omni/model_executor/models/qwen3_tts/qwen3_tts_talker.py (consumer)
  - community:zuiho-kai/claude-workflow-starter repos/vllm-omni/rules.md (verified
    in-repo 2026-07-12)
  first_seen: '2026-07-12'
  last_confirmed: '2026-07-12'
  confirmations: 1
  status: active
  history:
  - Shared worker runner _preprocess produces per-request phase metadata (_omni_prompt_len,
    _omni_num_computed_tokens, _omni_is_prefill) consumed by model talkers/preprocessors
    — review producer AND consumers together when either side changes.
- id: repo-wide-convention-plumbing-vs-parity
  module: repo-wide
  kind: convention
  channel: briefing
  text: Weight-load 0-missing/0-unexpected, shape smoke, no-NaN and CPU/mock CI prove
    plumbing only — model claims need HF semantic parity with a real checkpoint; perf
    claims need a locked config + scope label.
  source: agent
  evidence:
  - .buildkite/ leveled pipelines (L2 CPU/mock vs higher GPU tiers; cf issue#5014
    'L3 CI failure')
  - community:zuiho-kai/claude-workflow-starter repos/vllm-omni/rules.md (verified
    in-repo 2026-07-12)
  first_seen: '2026-07-12'
  last_confirmed: '2026-07-12'
  confirmations: 1
  status: active
  history:
  - 'Model-adaptation evidence tiers: weight-load 0-missing/0-unexpected, shape smoke,
    no-NaN and CPU/mock CI tiers prove plumbing only; semantic parity vs the HF reference
    and perf claims need real-checkpoint evidence with a locked config and scope label.'
- id: repo-wide-constraint-upstream-checkout
  module: repo-wide
  kind: constraint
  channel: briefing
  text: 'Aligned upstream vLLM checkout: /rebase/vllm — read it to verify any upstream
    claim (cite file:line); never cite an unread PR/version/line.'
  source: agent
  evidence:
  - 'eval judgments/val 2026-07: baseline wins on pr4810/pr4893 rest on /rebase/vllm
    reads; copilot fabricated PR #43167/vllm#46022 cites'
  - 'CLAUDE.md: /rebase/vllm is the upstream checkout used as rebase target'
  first_seen: '2026-07-12'
  last_confirmed: '2026-07-12'
  confirmations: 1
  status: active
  history:
  - The aligned upstream vLLM checkout is at /rebase/vllm — verify every claim about
    upstream behavior by reading it (cite file:line); never cite an upstream PR/version/line
    you did not open.
- id: online_serving-trap-run-level-dummy-weights
  module: online_serving
  kind: trap
  channel: briefing
  text: --run-level defaults to core_model = DUMMY weights even in online serving;
    garbage output on a manual server is run-level misconfig — use --run-level=full_model
    for behavior tests.
  source: agent
  evidence:
  - 'github:vllm-omni issue#4842 (closed INVALID: core_model default -> dummy weights;
    PR#4354 extended run-level to online serving)'
  first_seen: '2026-07-12'
  last_confirmed: '2026-07-12'
  confirmations: 1
  status: active
  history:
  - --run-level defaults to core_model, which loads DUMMY weights even in online serving
    — garbage outputs on a manually launched server are a run-level misconfig, not
    a model bug; full-model behavior needs --run-level=full_model.
- id: worker-trap-stage-capacity
  module: worker_runner
  kind: trap
  channel: retrieved
  text: 'Stage topology bugs: validate per-stage parallel world size (TP*PP*DP) against
    the stage''s resolved visible devices BEFORE worker creation; config merges CLI
    -> per-stage override -> deploy YAML -> platform overlay (vllm_omni/engine/stage_init_utils.py
    setup_stage_devices). deploy YAML devices:''0'' with --tensor-parallel-size 4
    crashes with ''DP adjusted local rank out of bounds''.'
  source: agent
  evidence:
  - vllm_omni/engine/stage_init_utils.py + stage_engine_startup.py (verified 2026-07-12)
  - github:vllm-omni issue#5003
  - community:zuiho-kai/claude-workflow-starter components/model-executor/rules.md
    (verified in-repo)
  first_seen: '2026-07-12'
  last_confirmed: '2026-07-12'
  confirmations: 1
  status: active
- id: model_executor-convention-checkpoint-layout
  module: model_executor
  kind: convention
  channel: retrieved
  text: Before a model id is written into docs/recipes/examples/perf configs, verify
    the checkpoint layout the pipeline loader needs (model_index.json, transformer/vae/scheduler/tokenizer
    subfolder configs, single-file safetensors support) — official and community-Diffusers
    repos differ; docs may only list checkpoints the CURRENT loader loads directly.
  source: agent
  evidence:
  - github:vllm-omni issue#4827 (Base vs Instruct checkpoint layout crash)
  - community:zuiho-kai/claude-workflow-starter review/guides/model-adaptation-guardrails.md
  first_seen: '2026-07-12'
  last_confirmed: '2026-07-12'
  confirmations: 1
  status: active
