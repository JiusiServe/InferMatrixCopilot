# Module map for vllm-omni (adapter Tier-2 knowledge).
# Extends the AUTHORITATIVE map in ../manifest.yaml (modules:) — which owns the
# paths / waves / risk tiers the rebase fan-out reads — with the per-module test
# locations and review notes. Do not diverge the paths/waves from the manifest.
schema_version: 1
authoritative_source: ../manifest.yaml
test_runner: pytest

modules:
  worker_runner:
    paths: [vllm_omni/worker/]
    tests: [tests/e2e/, tests/engine/]      # no dedicated tests/worker/; exercised via e2e/engine
    wave: 1
    risk: high
    note: "Tracks upstream vLLM worker internals — highest rebase-damage risk."
  model_executor:
    paths: [vllm_omni/model_executor/]
    tests: [tests/model_executor/, tests/model_tests/]
    wave: 1
    risk: high
    note: "Model loading + execution; sensitive to transformers version drift (AutoProcessor.register)."
  input_output:
    paths: [vllm_omni/inputs/, vllm_omni/outputs.py]
    tests: [tests/inputs/]
    wave: 1
  scheduler:
    paths: [vllm_omni/core/]
    tests: [tests/core/]
    wave: 1
    risk: high
    note: "'scheduler' == vllm_omni/core/ (not a top-level scheduler/ dir)."
  online_serving:
    paths: [vllm_omni/entrypoints/]
    tests: [tests/entrypoints/, tests/e2e/]
    wave: 1
  model_config:
    paths: [vllm_omni/config/]
    tests: [tests/config/]
    wave: 1
  platform:
    paths: [vllm_omni/platforms/]
    tests: [tests/platforms/]
    wave: 1
    note: "Per-backend (CUDA/ROCm/NPU/XPU) — changes need cross-platform review."
  benchmarks:
    paths: [benchmarks/]
    tests: [tests/benchmarks/]
    wave: 2
    note: "Throughput/latency, not correctness; lower rebase priority."

# Modality subsystems present in the tree but not in the manifest wave map —
# recorded so review knows where they live and which tests exercise them.
extra_subsystems:
  diffusion:
    paths: [vllm_omni/diffusion/]
    tests: [tests/diffusion/, tests/ar_diffusion/]
    note: "Non-autoregressive / Diffusion-Transformer (DiT) image·video·audio path."
  quantization: {paths: [vllm_omni/quantization/], tests: [tests/quantization/]}
  distributed:  {paths: [vllm_omni/distributed/], tests: [tests/distributed/]}
  attention:    {paths: [vllm_omni/attention/], tests: [tests/attention/]}
  engine:       {paths: [vllm_omni/engine/], tests: [tests/engine/]}

evidence:
  - "adapters/vllm_omni/manifest.yaml modules:"
  - "vllm-omni/vllm_omni/ and vllm-omni/tests/ directory layout"
