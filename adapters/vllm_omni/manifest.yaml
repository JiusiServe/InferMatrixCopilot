# Adapter zero — vllm-omni repo knowledge extracted to the edge.
name: vllm_omni
status: active
created_by: human
schema_version: 1
# explicit capabilities beyond the derived ones (repo.path, ci.provider, ...)
capabilities: [orchestrator.external]

repo:
  path: /rebase/vllm-omni
  default_branch: main
  rebase_branch: dev/vllm-align
  language: python

upstream:
  kind: fork_tracking
  repo_path: /rebase/vllm
  remote: origin

# Repo-specific slice of the SHARED, human-curated knowledge base (the vendored
# community docs at the repo-root `knowledge/` = settings.knowledge_dir;
# cross-repo general/ knowledge is shared, NOT nested here). Replaces the
# retired AI profile/. Provenance + the author's copy authorization are in
# doc/KNOWLEDGE.md. Paths below are relative to settings.knowledge_dir.
knowledge:
  source: zuiho-kai/claude-workflow-starter
  repo_subdir: repos/vllm-omni    # this repo's slice within the shared base
  briefing_docs:                  # always-on repo-specific slice: rules + nav
  - repos/vllm-omni/rules.md
  - repos/vllm-omni/_index.md

modules:
  worker_runner:
    local_paths: [vllm_omni/worker/]
    wave: 1
    risk: high
  model_executor:
    local_paths: [vllm_omni/model_executor/]
    wave: 1
    risk: high
  input_output:
    local_paths: [vllm_omni/inputs/, vllm_omni/outputs/]
    wave: 1
  scheduler:
    local_paths: [vllm_omni/core/]
    wave: 1
    risk: high
  online_serving:
    local_paths: [vllm_omni/entrypoints/]
    wave: 1
  model_config:
    local_paths: [vllm_omni/config/]
    wave: 1
  platform:
    local_paths: [vllm_omni/platforms/]
    wave: 1
  benchmarks:
    local_paths: [benchmarks/]
    wave: 2

validation:
  test_manifest_sources: [.buildkite/]
  precommit: true

ci:
  provider: buildkite
  org: vllm

push:
  default_remote: origin
  protected_branches: [main]
  allowed: false   # deliver via PR; never direct-push main
