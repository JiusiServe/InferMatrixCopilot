# vllm-omni agent-improvement dataset — 20 pr_review + 20 issue_answer,
# each split 10 train / 5 val / 5 test.
# Constructed 2026-07-11 from live github.com/vllm-project/vllm-omni state.
#
# Partition semantics (SIP-Bench-style; see README.md):
#   train — adaptation stream: the agent may learn from these (skills, profile facts,
#           prompt/checklist evolution). Weak-GT (open) items are concentrated here.
#   val   — promotion gate: candidate improvements are accepted only if val does not regress.
#   test  — FROZEN holdout: never read by any proposer, evaluated only at checkpoints
#           (T0/T1/...). Strong ground truth only.
# GOLD latent-gap review PRs (history proves what human review initially missed) are
# distributed one per partition: 4870 (train), 4810 (val), 4834 (test).
name: vllm_omni_dataset
repo: vllm-omni
github: vllm-project/vllm-omni
constructed_at: "2026-07-11"
splits:
  pr_review: {train: 10, val: 5, test: 5}
  issue_answer: {train: 10, val: 5, test: 5}

