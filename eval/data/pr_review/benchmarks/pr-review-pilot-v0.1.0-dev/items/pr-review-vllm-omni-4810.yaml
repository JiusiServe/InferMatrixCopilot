title: '[BugFix] Use KV cache scale mapper in custom loaders'
body: Fix custom model loaders that still call the removed vLLM get_cache_scale API after the vLLM 0.23 migration.
  Delegated loaders rely on AutoWeightsLoader; direct loaders apply get_cache_scale_mapper().
