- id: GT-4810-002
  summary: The delegated-loader regression test bypasses AutoWeightsLoader and cannot catch mapper regressions
  description: The test named for AutoWeightsLoader feeds an already-mapped .attn.k_scale name directly into the
    inner loader. It never sends the raw .k_proj.output_scale name through AutoWeightsLoader, so it would remain
    green if the outer mapper stopped running—the exact behavior the production change relies on.
  severity: Major
  category: test
  merge_blocking: false
  location_required: true
  accepted_locations:
