gt_findings:
- id: GT-3094-001
  summary: Omitting output_format changes the documented default encoding from PNG to JPEG
  description: When the request omits output_format, the response path calls the format selector without an explicit
    PNG fallback. The selector therefore chooses JPEG even though the request schema and API contract define PNG
    as the default, silently changing response bytes for existing callers.
  severity: Major
  category: compatibility_api
  merge_blocking: true
  location_required: true
  accepted_locations:
