    start_line: 1545
    end_line: 1562
    symbol: generate_images
    reason: The frozen response path does not supply the documented PNG fallback; the later fix passes it explicitly.
- id: GT-3094-002
  summary: The response model rejects size=None after successful image generation
  description: When size is omitted, the response builder explicitly passes null to ImageGenerationResponse.size,
    which is declared as a string. Pydantic v2 rejects the response after generation succeeds, so a default request
    can fail during response-model construction.
  severity: Blocker
  category: correctness
  merge_blocking: true
  location_required: true
  accepted_locations:
