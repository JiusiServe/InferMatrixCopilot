title: '[Bugfix][sleep mode]: guard generation on partial wake and ensure wake idempotency'
body: Track sleeping CuMem tags, reject generation while partially asleep, make duplicate wake-up idempotent, and
  reject unsupported level-2 wake-up before it reaches CUDA.
