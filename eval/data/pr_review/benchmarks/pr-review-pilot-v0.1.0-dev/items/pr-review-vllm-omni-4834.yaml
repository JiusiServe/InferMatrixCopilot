gt_findings:
- id: GT-4834-001
  summary: The default sleep level enters a state that wake_up can never recover from
  description: AsyncOmni.sleep() still defaults to level=2, but this PR makes every wake_up() after level-2 sleep
    raise NotImplementedError and blocks generation while tags remain asleep. A caller using the default sleep()
    then wake_up() sequence permanently bricks the engine until restart; the safe default should be level 1 or the
    level should be explicit.
  severity: Major
  category: correctness
  merge_blocking: true
  location_required: true
