# Issue answering — draft by default; posting needs the explicit post flag.
name: issue-answer
version: 2
status: active
provenance: {created_by: human, source: promoted from the generated L2 plan}
task_kinds: [issue_answer]
# repo-neutral (design v2 P2): any repo whose profile satisfies `requires`
repos: []
requires: [repo.path]
params: {}
steps:
  - {id: fetch, step: issue.fetch}
  - {id: draft, step: agent.draft_issue_answer}
  - {id: post, step: issue.post_answer, when: post}
  - {id: report, step: report.final_summary}
success: grounded draft produced; posted only on explicit request
