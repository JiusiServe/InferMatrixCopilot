# PR review — the copilot's own reviewer, improved from the eval findings
# (eval/ANALYSIS.md): deterministic gate checks (merge state / failing CI —
# the issue class no diff-only model caught), evidence-grounded tool-loop
# investigation over the repo checkout, domain checklist, then a
# verify-and-rewrite pass that keeps only grounded, actionable findings.
# Posting still needs the explicit post flag AND ALLOW_POST=1.
#
# Note: a Claude Code + skill engine was evaluated and briefly shipped as v2,
# then removed by owner decision — that path is EVAL-ONLY.
name: pr-review
version: 6
status: active
provenance:
  created_by: human
  source: v3 single-shot upgraded per eval findings (gate step + evidence loop
    + verify-and-rewrite); Claude Code engine kept eval-only
task_kinds: [pr_review]
# repo-neutral (design v2 P2): any repo whose profile satisfies `requires`
repos: []
requires: [repo.path]
# declared adaptation surface: specs carrying only these params still resolve
# as reuse (L0) — an undeclared param would demote to adapt (L1, review gate)
params:
  review_depth: "optional light|standard|full|auto — pins the adaptive review
    depth for this run (see review/planner.py)"
steps:
  - {id: fetch, step: pr.fetch_diff}
  - {id: gate, step: pr.gate_check}
  - {id: review, step: agent.review_diff}
  - {id: post, step: pr.post_review, when: post}
  - {id: report, step: report.final_summary}
success: grounded, actionable findings; gates reported; posted only on request
